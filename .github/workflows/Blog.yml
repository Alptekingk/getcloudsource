name: Blog Sistemi

on:
  push:
    paths:
      - 'blog/taslaklar/**.md'
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  notify_new_post:
    name: Yeni taslak bildirimi
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - run: pip install requests -q
      - name: Bildirim gonder
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 .github/scripts/notify.py

  listen_commands:
    name: Telegram komut dinleyici
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - run: pip install requests -q
      - name: Komutlari isle
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python3 .github/scripts/listen.py
