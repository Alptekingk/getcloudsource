name: Telegram Webhook Isleme

on:
  repository_dispatch:
    types: [telegram_command]

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Install deps
        run: pip install requests -q

      - name: Process command
        run: python3 .github/scripts/process_command.py
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CMD: ${{ github.event.client_payload.command }}
          FILENAME: ${{ github.event.client_payload.filename }}
