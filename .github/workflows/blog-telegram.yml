name: Blog Onay Sistemi

on:
  push:
    paths:
      - 'blog/taslaklar/**.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new draft
        id: detect
        run: |
          FILE=$(git diff --name-only HEAD~1 HEAD | grep 'blog/taslaklar/' | head -1)
          echo "file=$FILE" >> $GITHUB_OUTPUT
          if [ -n "$FILE" ] && [ -f "$FILE" ]; then
            TITLE=$(grep '^title:' "$FILE" | head -1 | sed 's/title: //' | tr -d '"')
            DATE=$(grep '^date:' "$FILE" | head -1 | sed 's/date: //')
            CATEGORY=$(grep '^category:' "$FILE" | head -1 | sed 's/category: //')
            SLUG=$(grep '^slug:' "$FILE" | head -1 | sed 's/slug: //')
            FILENAME=$(basename "$FILE" .md)
            echo "title=$TITLE" >> $GITHUB_OUTPUT
            echo "date=$DATE" >> $GITHUB_OUTPUT
            echo "category=$CATEGORY" >> $GITHUB_OUTPUT
            echo "slug=$SLUG" >> $GITHUB_OUTPUT
            echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram notification
        if: steps.detect.outputs.file != ''
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TITLE: ${{ steps.detect.outputs.title }}
          DATE: ${{ steps.detect.outputs.date }}
          CATEGORY: ${{ steps.detect.outputs.category }}
          FILENAME: ${{ steps.detect.outputs.filename }}
        run: |
          python3 << 'PYEOF'
          import os, requests

          token = os.environ['BOT_TOKEN']
          chat_id = os.environ['CHAT_ID']
          title = os.environ.get('TITLE', 'Yeni yazi')
          date = os.environ.get('DATE', '')
          category = os.environ.get('CATEGORY', '')
          filename = os.environ.get('FILENAME', '')

          msg = (
              "YENİ YAZI TASLAĞI\n\n"
              f"Baslik: {title}\n"
              f"Tarih: {date}\n"
              f"Kategori: {category}\n\n"
              f"Onaylamak icin: /onayla_{filename}\n"
              f"Reddetmek icin: /reddet_{filename}\n"
              f"Duzenleme icin: /duzenle_{filename}"
          )

          r = requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              json={"chat_id": chat_id, "text": msg}
          )
          print(f"Telegram response: {r.status_code} {r.text}")
          PYEOF
